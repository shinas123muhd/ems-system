{% extends "layouts/base.html" %}
{% block title %}Employee Detail — EMS Pro{% endblock %}
{% block page_title %}Employee Detail{% endblock %}

{% block topbar_actions %}
<a href="#" id="editBtn" class="btn btn-primary btn-sm">
  <i class="fas fa-pen"></i> Edit
</a>
<a href="/employees/" class="btn btn-secondary btn-sm">
  <i class="fas fa-arrow-left"></i> Back
</a>
{% endblock %}

{% block content %}

<div style="max-width:800px;" id="employeeContainer">

  <div style="text-align:center;color:var(--muted);padding:40px;">
    Loading employee...
  </div>

</div>

<script>

function getEmployeeIdFromUrl() {
    const parts = window.location.pathname.split("/");
    return parts[parts.length - 2]; 
}

function loadEmployee() {
    const empId = getEmployeeIdFromUrl();

    axios.get(`/api/employees/${empId}/`)
        .then(function(response) {

            const emp = response.data;

            document.title = emp.full_name + " — EMS Pro";
            document.getElementById("editBtn").href = `/employees/${emp.id}/edit/`;

            const initials =
                (emp.first_name?.[0] || "") +
                (emp.last_name?.[0] || "");

            let customFieldsHTML = "";

            if (emp.field_values && emp.field_values.length > 0) {
                customFieldsHTML = `
                <div class="card" style="margin-top:20px;">
                  <div class="card-header">
                    <h2 class="card-title">
                      Custom Fields — ${emp.form?.name || ""}
                    </h2>
                  </div>
                  <div class="card-body">
                    <div class="grid-2">
                      ${emp.field_values.map(fv => `
                        <div style="margin-bottom:16px;">
                          <p style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">
                            ${fv.form_field.label}
                          </p>
                          <p style="font-weight:600;">
                            ${fv.value || '<span style="color:var(--muted);">—</span>'}
                          </p>
                        </div>
                      `).join("")}
                    </div>
                  </div>
                </div>
                `;
            }

            document.getElementById("employeeContainer").innerHTML = `
            <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;">
              <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;">
                ${initials.toUpperCase()}
              </div>
              <div>
                <h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;">
                  ${emp.full_name}
                </h2>
                <p style="color:var(--muted);margin-top:4px;">
                  ${emp.email || ""}
                </p>
                <div style="margin-top:8px;display:flex;gap:8px;">
                  <span class="badge badge-accent">${emp.employee_id}</span>
                  ${emp.form ? `<span class="badge badge-success">${emp.form.name}</span>` : ""}
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Basic Information</h2>
              </div>
              <div class="card-body">
                <div class="grid-2">
                  <div>
                    <p style="font-size:12px;color:var(--muted);text-transform:uppercase;">Employee ID</p>
                    <p style="font-weight:600;">${emp.employee_id}</p>
                  </div>
                  <div>
                    <p style="font-size:12px;color:var(--muted);text-transform:uppercase;">Email</p>
                    <p style="font-weight:600;">${emp.email || "-"}</p>
                  </div>
                  <div>
                    <p style="font-size:12px;color:var(--muted);text-transform:uppercase;">Created</p>
                    <p style="font-weight:600;">${new Date(emp.created_at).toLocaleDateString()}</p>
                  </div>
                  <div>
                    <p style="font-size:12px;color:var(--muted);text-transform:uppercase;">Last Updated</p>
                    <p style="font-weight:600;">${new Date(emp.updated_at).toLocaleDateString()}</p>
                  </div>
                </div>
              </div>
            </div>

            ${customFieldsHTML}

            <div style="margin-top:20px;display:flex;gap:10px;">
              <a href="/employees/${emp.id}/edit/" class="btn btn-primary">
                <i class="fas fa-pen"></i> Edit Employee
              </a>
              <button onclick="deleteEmployee(${emp.id}, '${emp.full_name}')" class="btn btn-danger">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
            `;

        })
        .catch(function() {
            showToast("Failed to load employee.", "error");
        });
}

function deleteEmployee(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;

    axios.delete(`/api/employees/${id}/`)
        .then(function() {
            showToast("Employee deleted.", "success");
            window.location.href = "/employees/";
        })
        .catch(function() {
            showToast("Failed to delete.", "error");
        });
}

document.addEventListener("DOMContentLoaded", loadEmployee);

</script>

{% endblock %}
