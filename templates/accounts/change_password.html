{% extends "layouts/base.html" %}
{% block title %}Change Password — EMS Pro{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}

<div style="max-width:480px;">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">
        <i class="fas fa-lock" style="color:var(--accent);margin-right:8px;"></i>
        Change Password
      </h2>
    </div>

    <div class="card-body">

      <div id="errorBox" class="alert alert-danger" style="display:none;"></div>
      <div id="successBox" class="alert alert-success" style="display:none;"></div>

      <form id="changePasswordForm">

        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="old_password" class="form-control" required>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="new_password" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="new_password2" class="form-control" required>
        </div>

        <div style="display:flex;gap:10px;">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-key"></i> Update Password
          </button>
          <a href="/profile/" class="btn btn-secondary">Cancel</a>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
document.getElementById("changePasswordForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    errorBox.style.display = "none";
    successBox.style.display = "none";

    const data = {
        old_password: document.getElementById("old_password").value,
        new_password: document.getElementById("new_password").value,
        new_password2: document.getElementById("new_password2").value
    };

    axios.post("/api/auth/change-password/", data)
        .then(function(response) {
            successBox.style.display = "block";
            successBox.innerText = "Password changed successfully.";

            document.getElementById("changePasswordForm").reset();
        })
        .catch(function(error) {
            errorBox.style.display = "block";

            if (error.response && error.response.data) {
                const errors = error.response.data;

                if (errors.non_field_errors) {
                    errorBox.innerText = errors.non_field_errors[0];
                } else if (errors.old_password) {
                    errorBox.innerText = errors.old_password[0];
                } else if (errors.new_password) {
                    errorBox.innerText = errors.new_password[0];
                } else if (errors.new_password2) {
                    errorBox.innerText = errors.new_password2[0];
                } else {
                    errorBox.innerText = "Something went wrong.";
                }
            } else {
                errorBox.innerText = "Server error.";
            }
        });
});
</script>

{% endblock %}
