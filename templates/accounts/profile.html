{% extends "layouts/base.html" %}
{% block title %}My Profile — EMS Pro{% endblock %}
{% block page_title %}My Profile{% endblock %}
{% block content %}

<div style="max-width:700px;">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Profile Information</h2>
    </div>

    <div class="card-body">

      <div id="errorBox" class="alert alert-danger" style="display:none;"></div>
      <div id="successBox" class="alert alert-success" style="display:none;"></div>

      <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;">
        <div id="avatar-preview"
             style="width:80px;height:80px;border-radius:50%;
                    background:linear-gradient(135deg,var(--accent),var(--accent2));
                    display:flex;align-items:center;justify-content:center;
                    font-size:28px;font-weight:700;overflow:hidden;">
          U
        </div>
      </div>

      <form id="profileForm">

       

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" class="form-control">
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" class="form-control">
          </div>

          <div class="form-group">
            <label>Department</label>
            <input type="text" id="department" class="form-control">
          </div>
        </div>

        <div class="form-group">
          <label>Bio</label>
          <textarea id="bio" class="form-control"></textarea>
        </div>

        <div style="display:flex;gap:10px;">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Changes
          </button>
          <a href="/change-password/" class="btn btn-secondary">
            <i class="fas fa-lock"></i> Change Password
          </a>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
const errorBox = document.getElementById("errorBox");
const successBox = document.getElementById("successBox");

/* =========================
   LOAD PROFILE DATA
========================= */
function loadProfileData() {
    axios.get("/api/auth/profile/")
        .then(function(response) {
            const user = response.data;

           
            document.getElementById("username").value = user.username || "";
            document.getElementById("phone").value = user.phone || "";
            document.getElementById("department").value = user.department || "";
            document.getElementById("bio").value = user.bio || "";

           const initials =
                (user.username?.[0] || "")

            document.getElementById("avatar-preview").innerText =
                initials.toUpperCase();
        })
        .catch(function() {
            logoutUser();
        });
}

/* =========================
   UPDATE PROFILE
========================= */
document.getElementById("profileForm").addEventListener("submit", function(e) {
    e.preventDefault();

    errorBox.style.display = "none";
    successBox.style.display = "none";

    const data = {
        
        username: document.getElementById("username").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value,
        bio: document.getElementById("bio").value
    };

    axios.put("/api/auth/profile/", data)
        .then(function() {
            successBox.style.display = "block";
            successBox.innerText = "Profile updated successfully.";
            loadProfileData();
        })
        .catch(function(error) {
            errorBox.style.display = "block";

            if (error.response && error.response.data) {
                errorBox.innerText = Object.values(error.response.data)[0][0];
            } else {
                errorBox.innerText = "Something went wrong.";
            }
        });
});

/* Load profile when page opens */
document.addEventListener("DOMContentLoaded", function() {
    loadProfileData();
});
</script>

{% endblock %}
